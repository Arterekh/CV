<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Полученные заявки через форму обратной связи">
    <title>Заявки - Я студент ВШЭ</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .results-table th,
        .results-table td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        .results-table th {
            background-color: #1a3a6c;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .results-table tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .results-table tbody tr:hover {
            background-color: #e3f2fd;
        }

        .msg-cell {
            max-width: 260px;
            word-break: break-word;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-question   { background-color: #d4edda; color: #155724; }
        .badge-suggestion { background-color: #cce5ff; color: #004085; }
        .badge-complaint  { background-color: #f8d7da; color: #721c24; }
        .badge-other      { background-color: #e2e3e5; color: #383d41; }

        .results-status {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .results-error {
            color: #e74c3c;
        }

        .refresh-btn-wrap {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Высшая школа экономики</h1>
        <p>Я - студент ВШЭ</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="contact.html">Обратная связь</a></li>
            <li><a href="results.html">Заявки</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Полученные заявки</h2>
            <p>Все сообщения, отправленные через форму обратной связи.</p>

            <div class="refresh-btn-wrap">
                <button id="refresh-btn" class="btn">Обновить</button>
            </div>

            <div id="results-container">
                <p class="results-status">Загрузка...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Я - студент ВШЭ</p>
        <p>Контактная информация: aiterekhov_1@edu.hse.ru</p>
    </footer>

    <script src="js/results.js"></script>
</body>
</html>
